name: Deploy to GitHub Pages

on:
  # Deploy on push to the default branch.
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions required by the GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build with Astro
        # Installs deps (detects npm via package-lock.json), runs `astro build`,
        # and uploads dist/ as the Pages artifact.
        uses: withastro/action@v6

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # Pinned to v4 to match the canonical withastro/action example.
        # The Astro docs currently also reference actions/deploy-pages@v5;
        # bump this to @v5 if you prefer the docs' pairing.
        uses: actions/deploy-pages@v4
