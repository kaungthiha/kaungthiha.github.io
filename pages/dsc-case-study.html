/* ── Brand tokens ── */
:root {
  --e-primary:           #004870;
  --e-primary-dim:       #003251;
  --e-primary-container: #E3F2FD;
  --e-secondary:         #00668e;

  --e-tertiary:          #d12b2f;
  --e-bg:                #f4f7f9;
  --e-surface:           #ffffff;
  --e-surface-low:       #f0f4f9;
  --e-surface-high:      #edf2f7;
  --e-on-surface:        #1a1f24;
  --e-on-surface-var:    #4a5568;
  --e-outline:           #cbd5e0;
}

/* ── App shell ── */
#dsc-root { background: var(--e-bg); }
.ease-wrap {
  font-family: 'Manrope', sans-serif;
  color: var(--e-on-surface);
  background: var(--e-bg);

  margin: 0 auto;
  min-height: 100vh;
}

/* ── Material icons ── */
.mi {
  font-family: 'Material Symbols Outlined';
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  line-height: 1; user-select: none;
}
.mi-fill { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

/* ── Typography ── */
.ease-wrap h1, .ease-wrap h2, .ease-wrap h3, .ease-wrap h4 {
  font-family: 'Plus Jakarta Sans', sans-serif;
  margin: 0;
}

/* ── Buttons ── */
.e-btn {
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer; border: none; outline: none;
  font-family: 'Manrope', sans-serif; font-weight: 700;
  transition: all 0.15s ease;
}
.e-btn:active { transform: scale(0.97); }
.e-btn-primary {
  background: var(--e-primary); color: #fff;
  padding: 14px 20px; border-radius: 8px; width: 100%;
  font-size: 15px;
}
.e-btn-primary:hover { background: var(--e-primary-dim); }
.e-btn-secondary-outline {
  background: var(--e-surface-high); color: var(--e-primary);
  padding: 13px 20px; border-radius: 8px; width: 100%;
  font-size: 14px; border: 1px solid var(--e-outline);
}
.e-btn-secondary-outline:hover { background: rgba(203,213,224,0.3); }
.e-btn-ghost {
  background: none; color: var(--e-secondary);
  padding: 8px 0; font-size: 13px; font-weight: 700;
  display: inline-flex; align-items: center; gap: 4px;
}

/* ── Cards ── */
.e-card {
  background: var(--e-surface); border-radius: 16px;
  border: 1px solid rgba(203,213,224,0.3);
  box-shadow: 0 4px 20px rgba(0,73,119,0.08);
}
.e-card-glow {
  box-shadow: 0 0 0 1px rgba(0,73,119,0.1), 0 10px 30px -10px rgba(0,73,119,0.15);
}
.e-shadow-cap { box-shadow: 0 4px 24px rgba(0,44,77,0.08); }

/* ── Tags ── */
.e-tag {
  display: inline-block; padding: 2px 10px;
  background: var(--e-surface-low); color: var(--e-on-surface-var);
  border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.06em;
}
.e-tag-recommended {
  background: var(--e-secondary); color: #fff;
  border-radius: 999px; padding: 5px 12px;
}

/* ── Screen transitions ── */
.e-screen {
  opacity: 0; transform: translateX(30px);
  transition: opacity 0.28s ease, transform 0.28s ease;
  pointer-events: none;
}
.e-screen.e-screen-active {
  opacity: 1; transform: translateX(0); pointer-events: auto;
}
.e-screen.e-screen-exit {
  opacity: 0; transform: translateX(-30px);
}

/* ── Survey modal ── */
.e-survey-overlay {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; align-items: center; justify-content: center; padding: 24px;
  background: rgba(15,23,42,0.6); backdrop-filter: blur(4px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease;
}
.e-survey-overlay.open { opacity: 1; pointer-events: auto; }
.e-survey-modal {
  background: #fff; border-radius: 32px; overflow: hidden;
  width: 100%; max-width: 360px; box-shadow: 0 25px 60px rgba(0,0,0,0.2);
  transform: translateY(50px); opacity: 0;
  transition: transform 0.28s ease, opacity 0.28s ease;
  max-height: 90vh; overflow-y: auto;
}
.e-survey-overlay.open .e-survey-modal {
  transform: translateY(0); opacity: 1;
}

/* ── Survey steps ── */
.e-step { display: none; }
.e-step.active {
  display: block;
  animation: eSlideIn 0.25s ease-out forwards;
}
@keyframes eSlideIn {
  from { opacity: 0; transform: translateX(16px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ── Option buttons ── */
.e-option {
  width: 100%; text-align: left; padding: 18px 20px;
  border-radius: 16px; border: 2px solid transparent;
  background: var(--e-surface-low); cursor: pointer;
  font-family: 'Manrope', sans-serif; font-weight: 700;
  font-size: 15px; color: var(--e-on-surface);
  display: flex; align-items: center; justify-content: space-between;

}
.e-option:hover { background: var(--e-surface-high); }
.e-option.selected { border-color: var(--e-primary); background: rgba(0,72,112,0.05); }
.e-option:active { transform: scale(0.99); }

/* ── Expandable panels ── */
.e-expand {
  max-height: 0; overflow: hidden; opacity: 0;
  transition: max-height 0.3s ease-out, opacity 0.25s ease;
}
.e-expand.open { max-height: 1200px; opacity: 1; }

/* ── Toast ── */
.e-toast {
  position: fixed; bottom: 88px; left: 16px; right: 16px; z-index: 9998;
  background: var(--e-primary); color: #fff;
  padding: 14px 16px; border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.18);
  display: flex; align-items: center; gap: 10px;
  transform: translateY(80px); opacity: 0;
  transition: transform 0.3s ease, opacity 0.3s ease;
  pointer-events: none; max-width: 480px; margin: 0 auto;
}
.e-toast.show { transform: translateY(0); opacity: 1; pointer-events: auto; }

/* ── Warning bottom sheet ── */
.e-sheet-overlay {
  position: fixed; inset: 0; z-index: 9998;
  background: rgba(0,72,112,0.4); backdrop-filter: blur(4px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease;
}
.e-sheet-overlay.open { opacity: 1; pointer-events: auto; }
.e-sheet {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
  width: 100%; max-width: 480px;
  background: #fff; border-radius: 24px 24px 0 0; padding: 32px;
  transition: transform 0.3s ease;
}
.e-sheet-overlay.open .e-sheet { transform: translateX(-50%) translateY(0); }

/* ── App bottom nav ── */
.e-nav {
  background: rgba(255,255,255,0.92); backdrop-filter: blur(16px);
  border-top: 1px solid rgba(203,213,224,0.4);
  padding: 8px 0 20px; display: flex; justify-content: space-around;
}
.e-nav-item {

.e-nav-item:hover { color: var(--e-primary); }

.e-nav-dot {

/* ── App header ── */
.e-app-header {

/* ── Misc ── */

.e-back-link {
  display: inline-flex; align-items: center; gap: 6px;

.e-back-link:hover { text-decoration: underline; }
.e-icon-btn {
  width: 36px; height: 36px; border-radius: 50%; border: none;

  justify-content: center; color: var(--e-on-surface-var);

.thin-scroll::-webkit-scrollbar { height: 4px; }
.thin-scroll::-webkit-scrollbar-track { background: #f1f1f1; }

/* ══════════════════════════════════════════
   Survey Modal
   ══════════════════════════════════════════ */
function SurveyModal({ open, onClose, onComplete }) {
  const [step, setStep] = useState(1);
  const [userData, setUserData] = useState({});
  const [selected, setSelected] = useState(null);
  const progressMap = { 1: '25%', 2: '50%', 3: '75%', 4: '100%' };

  const handleNext = (stepNum, data) => {
    setUserData(prev => ({...prev, ...data}));
    if (step < 4) setStep(step + 1);
  };

  const handleBack = () => { if (step > 1) setStep(step - 1); };

  const handleFinalize = () => {
    if (!selected) { alert('Please select your primary concern first.'); return; }
    const final = {...userData, user_primary_concern: selected};
    onComplete(final);
  };

  // Reset on close
  useEffect(() => {
    if (!open) { setStep(1); setUserData({}); setSelected(null); }
  }, [open]);

  return (
    <div className={`e-survey-overlay${open ? ' open' : ''}`}>
      <div className="e-survey-overlay" style={{position:'absolute',inset:0}} onClick={onClose} />
      <div className="e-survey-modal" style={{position:'relative',zIndex:1}}>

        {/* Progress bar */}
        <div style={{height:6,background:'#f1f5f9'}}>
          <div className="e-progress" style={{height:'100%',background:'var(--e-primary)',width:progressMap[step]}} />
        </div>

        <div style={{padding:'20px 28px 28px'}}>
          {/* Nav row */}
          <div className="tw-flex tw-justify-between tw-items-center" style={{marginBottom:16}}>
            <button className="e-btn" onClick={handleBack} style={{
              visibility: step > 1 ? 'visible' : 'hidden',
              background:'none', color:'var(--e-on-surface-var)', padding:'6px 0',
              display:'flex', alignItems:'center', gap:4, fontSize:12, fontWeight:700,
              textTransform:'uppercase', letterSpacing:'0.06em'
            }}>
              <span className="mi" style={{fontSize:18}}>arrow_back</span> Back
            </button>
            <button className="e-btn" onClick={() => onComplete(userData)} style={{
              background:'none', color:'var(--e-on-surface-var)', fontSize:12,
              fontWeight:700, textTransform:'uppercase', letterSpacing:'0.06em', padding:'6px 0'
            }}>
              Skip
            </button>
          </div>

          {/* Step 1 */}
          <div className={`e-step${step === 1 ? ' active' : ''}`}>
            <h3 style={{fontSize:22,fontWeight:800,marginBottom:8,lineHeight:1.3}}>Let's understand your situation</h3>
            <p style={{color:'var(--e-on-surface-var)',marginBottom:24,fontSize:15}}>Are you having trouble making payments?</p>
            <div className="tw-flex tw-flex-col tw-gap-3">
              {['Yes','Sometimes','No'].map((opt, i) => {
                const vals = ['yes','sometimes','no'];
                return (
                  <button key={opt} className="e-option" onClick={() => handleNext(1, {user_payment_difficulty: vals[i]})}>
                    {opt}
                    <span className="mi" style={{fontSize:18,color:'var(--e-outline)'}}>chevron_right</span>
                  </button>
                );
              })}
            </div>
          </div>

          {/* Step 2 */}
          <div className={`e-step${step === 2 ? ' active' : ''}`}>
            <h3 style={{fontSize:22,fontWeight:800,marginBottom:8,lineHeight:1.3}}>Tell us about your debt</h3>
            <p style={{color:'var(--e-on-surface-var)',marginBottom:24,fontSize:15}}>Do you have debt outside of Capital One?</p>
            <div className="tw-flex tw-flex-col tw-gap-3">
              {[['Yes', true], ['No', false]].map(([label, val]) => (
                <button key={label} className="e-option" onClick={() => handleNext(2, {user_external_debt: val})}>
                  {label}
                  <span className="mi" style={{fontSize:18,color:'var(--e-outline)'}}>chevron_right</span>
                </button>
              ))}
            </div>
          </div>

          {/* Step 3 */}
          <div className={`e-step${step === 3 ? ' active' : ''}`}>
            <h3 style={{fontSize:22,fontWeight:800,marginBottom:8,lineHeight:1.3}}>Debt Settlement</h3>
            <p style={{color:'var(--e-on-surface-var)',marginBottom:24,fontSize:15}}>Have you considered debt settlement services?</p>
            <div className="tw-flex tw-flex-col tw-gap-3">
              {[['Yes','high'],['Not sure','unsure'],['No','low']].map(([label, val]) => (
                <button key={label} className="e-option" onClick={() => handleNext(3, {user_dsc_intent: val})}>
                  {label}
                  <span className="mi" style={{fontSize:18,color:'var(--e-outline)'}}>chevron_right</span>
                </button>
              ))}
            </div>
          </div>

          {/* Step 4 */}
          <div className={`e-step${step === 4 ? ' active' : ''}`}>
            <h3 style={{fontSize:22,fontWeight:800,marginBottom:8,lineHeight:1.3}}>The Final Step</h3>
            <p style={{color:'var(--e-on-surface-var)',marginBottom:24,fontSize:15}}>What's your biggest concern right now?</p>
            <div className="tw-flex tw-flex-col tw-gap-3">
              {['Monthly payments too high','Too many accounts','Behind on payments','Exploring options'].map(opt => (
                <button key={opt}
                  className={`e-option${selected === opt ? ' selected' : ''}`}
                  onClick={() => setSelected(opt)}>
                  {opt}
                </button>
              ))}
            </div>
            <button className="e-btn e-btn-primary" onClick={handleFinalize}
              style={{marginTop:24,borderRadius:999,fontSize:17,fontWeight:800}}>
              See My Options
            </button>
          </div>

          {/* Info callout */}
          <div style={{marginTop:24,background:'var(--e-surface-low)',borderRadius:16,padding:16,display:'flex',gap:12,alignItems:'flex-start'}}>
            <span className="mi mi-fill" style={{color:'var(--e-primary)',fontSize:22,flexShrink:0}}>info</span>
            <p style={{fontSize:12,color:'var(--e-on-surface-var)',lineHeight:1.6,margin:0}}>
              Don't worry, we'll keep this secure. We're here to help you stay on track with zero judgment.
            </p>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════

/* ══════════════════════════════════════════
   Root App
   ══════════════════════════════════════════ */
function App() {
  const [screen, setScreen] = useState('dashboard');
  const [surveyOpen, setSurveyOpen] = useState(false);
  const [toastVisible, setToastVisible] = useState(false);

  const navigate = (to) => {
    setScreen(to);
    window.scrollTo({ top: 0 });
  };

  const handleSurveyComplete = () => {
    setSurveyOpen(false);
    setTimeout(() => navigate('paths'), 280);
  };

  const handleStartPlan = () => {
    setToastVisible(true);
    setTimeout(() => {
      setToastVisible(false);
      setTimeout(() => navigate('confirmation'), 200);
    }, 1600);
  };

  return (
    <div className="ease-wrap">
      {/* Toast (lives outside screen components) */}
      <div className={`e-toast${toastVisible ? ' show' : ''}`} style={{maxWidth:480}}>
        <span className="mi" style={{color:'#4ade80',fontSize:20}}>check_circle</span>
        <span style={{fontSize:13,fontWeight:700}}>Plan successfully started! Check your email.</span>
      </div>

      {screen === 'dashboard' && (
        <>
          <Dashboard onOpenSurvey={() => setSurveyOpen(true)} />
          <SurveyModal
            open={surveyOpen}
            onClose={() => setSurveyOpen(false)}
            onComplete={handleSurveyComplete}
          />
        </>
      )}

      {screen === 'paths' && (
        <SupportPaths
          onBack={() => navigate('dashboard')}
          onStartPlan={handleStartPlan}
        />
      )}

      {screen === 'confirmation' && (
        <Confirmation
          onBack={() => navigate('paths')}
          onRestart={() => navigate('dashboard')}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('dsc-root')).render(<App />);
