<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<link rel="icon" href="{{ site.baseurl }}/{{site.favicon}}">

<title>{{ page.title }} | {{site.title}}</title>

{% seo %}

<!-- Editorial Portfolio CSS -->
<link href="{{ site.baseurl }}/assets/css/editorial.css" rel="stylesheet">

<!-- Font Awesome (used by inner project pages) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

{% if jekyll.environment == "production" %}
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id={{site.ganalytics}}"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', '{{site.ganalytics}}');
</script>
{% endif %}

</head>

{% capture layout %}{% if page.layout %}layout-{{ page.layout }}{% endif %}{% endcapture %}
<body class="{{ layout }}">

<a class="skip-link" href="#main">Skip to content</a>

<!-- Weather backdrops (populated lazily by weather.js) -->
<div class="weather-bg weather-bg--sunny" aria-hidden="true"></div>
<div class="weather-bg weather-bg--rainy" aria-hidden="true"></div>
<div class="weather-bg weather-bg--snowy" aria-hidden="true"></div>

<!-- Cursor ripple (canvas injected by ripple.js, fine pointers only) -->

{% unless page.url == "/" %}
<!-- Slim chrome on non-home pages — keeps brand presence + a way back -->
<nav class="editorial-topnav editorial-topnav--slim" aria-label="Site">
  <div class="topnav-brand">
    <a href="{{ site.baseurl }}/">
      <span class="topnav-brand-mark" aria-hidden="true"></span>
      <span class="topnav-brand-text">Kaung Thiha</span>
    </a>
  </div>
  <a class="topnav-link topnav-link--back" href="{{ site.baseurl }}/">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="width:14px;height:14px;margin-right:0.35rem;"><path d="M19 12H5m6-6-6 6 6 6"/></svg>
    Back to portfolio
  </a>
</nav>
{% endunless %}

<!-- Main Content -->
<main id="main">
      {{ content }}
</main>

<!-- JavaScript -->
<script src="{{ site.baseurl }}/assets/js/weather.js" defer></script>
<script src="{{ site.baseurl }}/assets/js/ripple.js" defer></script>

</body>

</html>
